<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đăng nhập</title>
<style>
    body{
        font-family: Arial, sans-serif;
        display:flex;
        justify-content:center;
        align-items:center;
        height:100vh;
        margin:0;
    }
    .box{
        width:350px;
        border:1px solid #ccc;
        padding:20px;
        border-radius:10px;
        text-align:center;
    }
    input{
        width:95%;
        padding:8px;
        margin:8px 0;
    }
    button{
        padding:8px 20px;
    }
</style>
</head>
<body>
<div class="box">
<h2>Đăng nhập</h2>
{% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
        {% for category, message in messages %}
            <p>{{ message }}</p>
        {% endfor %}
    {% endif %}
{% endwith %}
<form method="POST">
    <input type="text"
           name="username"
           placeholder="Tên đăng nhập"
           required>
    <input type="password"
           name="password"
           placeholder="Mật khẩu"
           required>
    <br>
    <button type="submit">
        Đăng nhập
    </button>
</form>
<br>
<a href="/register">Chưa có tài khoản? Đăng ký</a>
</div>
</body>
</html>
