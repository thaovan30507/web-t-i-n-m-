<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đăng ký tài khoản</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="position-absolute top-0 end-0 p-3">
    <a href="/login" class="btn btn-sm btn-outline-primary rounded-pill me-2">Đăng nhập</a>
    <a href="/register" class="btn btn-sm btn-primary rounded-pill">Đăng ký</a>
</div>
<div class="container mt-5" style="max-width:500px">
<h2 class="text-center mb-4">
    Đăng ký tài khoản
</h2>
{% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
        {% for category, message in messages %}
            <div class="alert alert-{{ category }}">
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}
{% endwith %}
<form method="POST">
    <div class="mb-3">
        <label class="form-label">Tên đăng nhập</label>
        <input type="text"
               name="username"
               class="form-control"
               required>
    </div>
    <div class="mb-3">
        <label class="form-label">Mật khẩu</label>
        <input type="password"
               name="password"
               class="form-control"
               required>
    </div>
    <button type="submit"
            class="btn btn-primary w-100">
        Đăng ký
    </button>
</form>
</div>
</body>
</html>
