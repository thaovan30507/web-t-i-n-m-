<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Thêm từ mới vào từ điển</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5" style="max-width: 600px;">
    <div class="card shadow">
        <div class="card-header bg-primary text-white">
            <h3 class="card-title mb-0 text-center">Thêm Từ Vựng Mới</h3>
        </div>
        <div class="card-body p-4">

            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
                            {{ message }}
                        </div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <form action="{{ url_for('add_word') }}" method="POST">
                <div class="mb-3">
                    <label for="english_word" class="form-label">Từ tiếng Anh <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" id="english_word" name="english_word" placeholder="Ví dụ: Hello" required>
                </div>

                <div class="mb-3">
                    <label for="phonetics" class="form-label">Phiên âm</label>
                    <input type="text" class="form-control" id="phonetics" name="phonetics" placeholder="Ví dụ: /həˈləʊ/">
                </div>

                <div class="mb-3">
                    <label for="word_type" class="form-label">Từ loại</label>
                    <select class="form-select" id="word_type" name="word_type">
                        <option value="Noun">Noun (Danh từ)</option>
                        <option value="Verb">Verb (Động từ)</option>
                        <option value="Adjective">Adjective (Tính từ)</option>
                        <option value="Adverb">Adverb (Trạng từ)</option>
                        <option value="Preposition">Preposition (Giới từ)</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label for="vietnamese_meaning" class="form-label">Nghĩa tiếng Việt <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" id="vietnamese_meaning" name="vietnamese_meaning" placeholder="Ví dụ: Xin chào" required>
                </div>

                <div class="mb-3">
                    <label for="example_sentence" class="form-label">Câu ví dụ</label>
                    <textarea class="form-control" id="example_sentence" name="example_sentence" rows="2" placeholder="Ví dụ: Hello, how are you?"></textarea>
                </div>

                <div class="d-grid gap-2 mt-4">
                    <button type="submit" class="btn btn-success">Lưu vào từ điển</button>
                    <a href="{{ url_for('index') }}" class="btn btn-secondary">Quay lại trang chủ</a>
                </div>
            </form>

        </div>
    </div>
</div>

</body>
</html>
